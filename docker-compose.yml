services:
  server:
    build:
      context: ./Server
      dockerfile: Containerfile
    container_name: CaptionGlassesServer_Linked
    ports:
      - "2001:2001"
    networks:
      - app-network
    env_file:
      - ./Server/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2001/health"]
      interval: 10s
      timeout: 5s
      retries: 50
      start_period: 120s
  test:
    build:
      context: ./Local_Dev
      dockerfile: Containerfile
    container_name: CaptionGlassesLocal_Linked
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - SERVER_URL=ws://server:2001/ws

networks:
  app-network:
    driver: bridge